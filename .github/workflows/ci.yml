name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: '--max-old-space-size=8192'
  CI: true

jobs:
  redaction:
    name: Redaction Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan changed lines
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            bash scripts/check-redaction.sh --revs "$PR_BASE_SHA..HEAD"
          elif [ "$PUSH_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            bash scripts/check-redaction.sh --revs "$PUSH_BEFORE_SHA..HEAD"
          else
            bash scripts/check-redaction.sh --revs HEAD
          fi

  verify:
    name: Build, Test, Audit
    runs-on: ubuntu-latest
    needs: redaction
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: ocd/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install JS dependencies
        working-directory: ocd
        run: npm ci --legacy-peer-deps

      - name: Compile packages for codegen
        working-directory: ocd
        run: npm run compile-for-codegen

      - name: Generate code
        working-directory: ocd
        run: npm run github-action-generate

      - name: Setup Landing Zone sources
        working-directory: ocd
        run: npm run setup-lz

      - name: Check generated drift
        run: |
          git diff --exit-code -- \
            ocd/packages/codegen-cli/schema \
            ocd/packages/model/src \
            ocd/packages/export/src \
            ocd/packages/import/src \
            ocd/packages/react/src/components/properties \
            ocd/packages/react/src/components/tabular \
            ocd/packages/react/src/data

      - name: Run Python tests
        run: pytest -q

      - name: Build workspace libraries
        working-directory: ocd
        run: |
          npm run build \
            --workspace=packages/core \
            --workspace=packages/model \
            --workspace=packages/query \
            --workspace=packages/import \
            --workspace=packages/export \
            --workspace=packages/parser \
            --if-present

      - name: Run React tests
        working-directory: ocd
        run: npm test

      - name: Typecheck React package
        working-directory: ocd/packages/react
        run: npx tsc -b ./tsconfig.lib.json

      - name: Typecheck Desktop package
        working-directory: ocd/packages/desktop
        run: npm run typecheck

      - name: Build GitHub Pages artifact
        working-directory: ocd
        run: npm run build:pages

      - name: Audit JS dependencies
        working-directory: ocd
        run: npm audit --audit-level=high
