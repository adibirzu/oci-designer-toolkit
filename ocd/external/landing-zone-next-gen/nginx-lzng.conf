# QID 86247 Fix: Hide Nginx version and prevent internal IP disclosure
server_tokens off;

server {
    listen 80;
    server_name ontv.oci-tools.com;

    root /home/opc/ontv/dist;
    index index.html;

    # Remove Server header to prevent server software disclosure
    proxy_hide_header X-Powered-By;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /home/opc/ontv/dist;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        # Rewrite internal addresses in redirect headers to the public hostname
        proxy_redirect http://127.0.0.1:3001 $scheme://$host;
        proxy_redirect http://0.0.0.0:3001 $scheme://$host;
        proxy_redirect http://localhost:3001 $scheme://$host;
        # Hide internal headers from backend
        proxy_hide_header X-Powered-By;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_redirect http://127.0.0.1:3001 $scheme://$host;
        proxy_redirect http://0.0.0.0:3001 $scheme://$host;
        proxy_redirect http://localhost:3001 $scheme://$host;
        proxy_hide_header X-Powered-By;
    }
}

server {
    listen 443 ssl;
    server_name ontv.oci-tools.com;

    ssl_certificate     /etc/nginx/ssl/ontv.oci-tools.com.fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/ontv.oci-tools.com.key;

    root /home/opc/ontv/dist;
    index index.html;

    # Remove Server header to prevent server software disclosure
    proxy_hide_header X-Powered-By;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_redirect http://127.0.0.1:3001 https://$host;
        proxy_redirect http://0.0.0.0:3001 https://$host;
        proxy_redirect http://localhost:3001 https://$host;
        proxy_hide_header X-Powered-By;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_redirect http://127.0.0.1:3001 https://$host;
        proxy_redirect http://0.0.0.0:3001 https://$host;
        proxy_redirect http://localhost:3001 https://$host;
        proxy_hide_header X-Powered-By;
    }
}
