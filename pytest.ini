[pytest]
# Scope test collection to this repository's own tests only.
# The vendored OCI Landing Zones baseline clone (baselines/, git-ignored) and
# the legacy okitclassic app are third-party / out of scope and must not be
# collected by the project test gate.
testpaths = scripts/tests
norecursedirs = baselines okitclassic node_modules ocd .git addons output log
